title: The Flywheel Planning Playbook
description: "Definitive guide to building software with AI agent swarms — 12 principles, 10 phases, 41 prompts."
baseurl: "/flywheel-playbook"
url: "https://starensen.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.1

color_scheme: dark

permalink: pretty

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules

aux_links:
  "GitHub":
    - "https://github.com/StarenseN/flywheel-playbook"

nav_enabled: true
search_enabled: true

heading_anchors: true

back_to_top: true
back_to_top_text: "Back to top"

footer_content: "Based on Jeffrey Emanuel's methodology. Synthesized from forensic analysis of 5 repos, 69 sessions, 8,914 tweets."

callouts:
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow
  note:
    title: Note
    color: blue
