[project]
site_name = "The Flywheel Planning Playbook — Definitive Edition"
site_description = "Complete guide to building software with AI agent swarms — 12 principles, 9 phases, 47 prompts. Based on Jeffrey Emanuel's agentic coding methodology."
site_author = "Based on @doodlestein's methodology"

copyright = """
Based on <a href="https://jeffreyemanuel.com/">Jeffrey Emanuel's</a> agentic coding methodology. Extended by <a href="https://x.com/voidserf">@voidserf</a>.
"""

nav = [
  { "Home" = "index.md" },
  { "Playbook" = [
    { "Overview" = "playbook/index.md" },
    "playbook/principles.md",
    "playbook/phase-0-prerequisites.md",
    "playbook/phase-1-draft.md",
    "playbook/phase-2-refine.md",
    "playbook/phase-3-alien-artifacts.md",
    "playbook/phase-4-beads.md",
    "playbook/phase-5-qa.md",
    "playbook/phase-6-swarm.md",
    "playbook/phase-7-review.md",
    "playbook/phase-8-performance.md",
  ]},
  { "Prompts" = [
    { "Overview" = "prompts/overview.md" },
    "prompts/prompt-pack.md",
  ]},
  { "Reference" = [
    { "Overview" = "reference/index.md" },
    "reference/dispatch.md",
    "reference/doctrine.md",
    "reference/anti-patterns.md",
    "reference/toolchain.md",
  ]},
  { "Zero to Hero" = [
    { "Overview" = "zero-to-hero/index.md" },
    { "1.1 The Problem" = "zero-to-hero/section-1-1.md" },
    { "1.2 The Flywheel" = "zero-to-hero/section-1-2.md" },
    { "1.3 What's Different" = "zero-to-hero/section-1-3.md" },
    { "1.4 Economics" = "zero-to-hero/section-1-4.md" },
    { "1.5 Core Principles" = "zero-to-hero/section-1-5.md" },
    { "2.1 Environment" = "zero-to-hero/section-2-1.md" },
    { "2.2 Project Anatomy" = "zero-to-hero/section-2-2.md" },
    { "2.3 Writing the Plan" = "zero-to-hero/section-2-3.md" },
    { "2.4 Plan to Beads" = "zero-to-hero/section-2-4.md" },
    { "2.5 Execution" = "zero-to-hero/section-2-5.md" },
    { "2.6 Multi-Agent" = "zero-to-hero/section-2-6.md" },
    { "2.7 Daily Workflow" = "zero-to-hero/section-2-7.md" },
    { "3.1 Tools" = "zero-to-hero/section-3-1.md" },
    { "3.2 Prompts" = "zero-to-hero/section-3-2.md" },
    { "3.3 Configuration" = "zero-to-hero/section-3-3.md" },
    { "3.4 Scaling" = "zero-to-hero/section-3-4.md" },
    { "3.5 Troubleshooting" = "zero-to-hero/section-3-5.md" },
    { "3.6 Anti-Patterns" = "zero-to-hero/section-3-6.md" },
  ]},
  { "Jeff Teaches" = "jeff-teaches.md" },
  { "🤖 For Agents" = [
    { "Prompt Injector" = "agent/index.md" },
    { "Methodology Kernel" = "agent/kernel.md" },
  ]},
]

[project.theme]
language = "en"
features = [
    "content.code.copy",
    "content.code.select",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/StarenseN/flywheel-playbook"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/voidserf"
